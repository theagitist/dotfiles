# ===========================================================
# General
# ===========================================================

# Reload configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any
set -g renumber-windows on

# Larger scrollback buffer (default is 2000)
set -g history-limit 50000

# Reduce escape-time (default 500ms makes vim sluggish)
set -sg escape-time 10

# Enable focus events for editors like vim/neovim
set -g focus-events on

# Activity monitoring (highlight in status bar, no popup)
set -g monitor-activity on
set -g visual-activity off

# Better resizing when connecting from multiple terminals
setw -g aggressive-resize on

# ===========================================================
# Terminal & True Color
# ===========================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ===========================================================
# Security
# ===========================================================

# Lock session after 30 minutes of idle (cross-platform)
set -g lock-after-time 1800
if-shell "uname | grep -q Darwin" \
  "set -g lock-command 'pmset displaysleepnow'" \
  "set -g lock-command 'vlock'"

# Prevent escape-sequence attacks via window renaming
set -g allow-rename off
set -g automatic-rename off

# Block passthrough escape sequences
set -g allow-passthrough off

# ===========================================================
# Mouse & Input
# ===========================================================

set -g mouse on

# Highlight active pane border
set -g pane-active-border-style "fg=yellow,bold"
set -g pane-border-style "fg=grey"

# Dim inactive panes (different background)
set -g window-style "bg=colour235"
set -g window-active-style "bg=colour0"

# ===========================================================
# Vi Mode & Copy/Paste
# ===========================================================

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ===========================================================
# Key Bindings
# ===========================================================

# Intuitive pane splitting (preserves current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows preserve current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===========================================================
# Plugins (Prefix + I to install)
# ===========================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jaclu/tmux-menus'

# ===========================================================
# Dracula Theme
# ===========================================================

set -g @plugin 'dracula/tmux'
set -g @dracula-show-flags true
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-fahrenheit false
set -g @dracula-show-left-sep '▶'
set -g @dracula-show-right-sep '◀'

# ===========================================================
# Initialize TPM (keep at the very bottom)
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# ===========================================================

run '~/.tmux/plugins/tpm/tpm'
